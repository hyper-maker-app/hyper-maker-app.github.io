<?xml version="1.0" encoding="UTF-8"?>
<!--
    HyperIsle Brand Logo
    Standalone SVG translation of the Android launcher foreground vector
    (see app/src/main/res/drawable/ic_launcher_foreground.xml).

    Used in README.md / README.en.md / README.tr.md for GitHub display.
    Keep in sync with the Android vector; this is the canonical web asset.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="256" height="256">
    <defs>
        <!-- Outer halo: subtle blue-violet ring around the sphere -->
        <radialGradient id="halo" cx="54" cy="54" r="42" gradientUnits="userSpaceOnUse">
            <stop offset="0.60" stop-color="#000000" stop-opacity="0"/>
            <stop offset="0.80" stop-color="#00C6FF" stop-opacity="0.2"/>
            <stop offset="0.95" stop-color="#C084FC" stop-opacity="0.33"/>
            <stop offset="1.00" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>

        <!-- Sphere body: dark glass gradient (lit from top) -->
        <radialGradient id="sphere" cx="54" cy="48" r="35" gradientUnits="userSpaceOnUse">
            <stop offset="0.0" stop-color="#3A3A50"/>
            <stop offset="0.4" stop-color="#2A2A3A"/>
            <stop offset="0.8" stop-color="#1A1A28"/>
            <stop offset="1.0" stop-color="#0E0E18"/>
        </radialGradient>

        <!-- Main wave: cyan → indigo → magenta stroke -->
        <linearGradient id="wave" x1="28" y1="54" x2="80" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0.00" stop-color="#00D4FF"/>
            <stop offset="0.25" stop-color="#00E0FF"/>
            <stop offset="0.50" stop-color="#8B7AFF"/>
            <stop offset="0.75" stop-color="#D090FF"/>
            <stop offset="1.00" stop-color="#F088FF"/>
        </linearGradient>

        <!-- Secondary wave: softer parallel accent for depth -->
        <linearGradient id="wave2" x1="30" y1="58" x2="78" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0.0" stop-color="#00C6FF" stop-opacity="0.67"/>
            <stop offset="0.5" stop-color="#8B7AFF" stop-opacity="0.67"/>
            <stop offset="1.0" stop-color="#D090FF" stop-opacity="0.67"/>
        </linearGradient>
    </defs>

    <!-- Halo -->
    <circle cx="54" cy="54" r="42" fill="url(#halo)"/>

    <!-- Sphere body -->
    <circle cx="54" cy="54" r="30" fill="url(#sphere)"/>

    <!-- Bright rim: white edge light for definition -->
    <circle cx="54" cy="54" r="30" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5"/>

    <!-- Main wave (bold) -->
    <path d="M28,54 Q36,44 46,54 Q54,64 62,54 Q72,44 80,54"
          fill="none"
          stroke="url(#wave)"
          stroke-width="4.5"
          stroke-linecap="round"/>

    <!-- Secondary wave (depth) -->
    <path d="M30,58 Q38,50 48,58 Q56,66 64,58 Q72,50 78,56"
          fill="none"
          stroke="url(#wave2)"
          stroke-width="2.5"
          stroke-linecap="round"/>

    <!-- Top glass highlight -->
    <path d="M38,34 Q54,28 70,34"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.38"
          stroke-width="1.5"
          stroke-linecap="round"/>

    <!-- Small accent -->
    <path d="M40,38 Q48,36 56,38"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.25"
          stroke-width="0.8"
          stroke-linecap="round"/>
</svg>